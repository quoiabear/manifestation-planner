<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Planner</title>
    <style>
        body {
            /* Replace 'daily-planner.png' with your actual filename */
            background-image: url('daily-planner.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fff0f5;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* This is the box you can type in */
        .my-input {
            position: absolute;
            top: 300px;  /* Adjust these numbers to move the box */
            left: 100px; /* Adjust these numbers to move the box */
            width: 250px;
            height: 400px;
            background: transparent; /* Makes it look like it's on the paper */
            border: none;
            outline: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- This is the area where you will type -->
    <textarea class="my-input" placeholder="Start typing here..."></textarea>

</body>
</html>
