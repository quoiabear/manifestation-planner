<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura and Essence Celestial It Girl Planner</title>
    <style>
    body {
        background-color: #fff0f5; /* Light blush pink background */
        font-family: 'Arial', sans-serif;
        color: #d63384; /* Celestial pink text */
    }

    nav ul {
        display: flex;
        list-style: none;
        gap: 20px;
        background: #ffb7c5; /* Soft pastel pink nav bar */
        padding: 15px;
        border-radius: 15px;
    }

    #dashboard-tools {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
    }

    #todo-list, #sticky-notes, #sticker-gallery {
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border: 2px solid #ffc0cb;
    }

    h1, h2 {
        color: #ff69b4; /* Hot pink headings */
    }
</style>
</head>
<body>
    <nav>
        <ul>
            <li>Dashboard</li>
            <li>Journaling</li>
            <li>Study Tools</li>
            <li>Budget</li>
        </ul>
    </nav>

    <main>
<main>
    <section id="welcome-message">
        <h1>Welcome, beautiful!</h1>
    </section>

    <div id="dashboard-tools">
        <section id="todo-list">
            <h2>To-Do List</h2>
            <input type="text" id="taskInput" placeholder="Add a task...">
            <button onclick="addTask()">Add</button>
            <ul id="taskList"></ul>
        </section>

        <section id="sticky-notes">
            <h2>Notes</h2>
            <textarea placeholder="Write a note..."></textarea>
        </section>

        <section id="calendar-section">
            <h2>Calendar</h2>
            <input type="date">
        </section>
    </div>

    <section id="journaling">
        <h2>Journaling & Scripting</h2>
        <textarea id="journal-input" placeholder="What are you manifesting today?"></textarea>
    </section>
</main>
    <script>
    function addTask() {
        let taskInput = document.getElementById("taskInput");
        let taskList = document.getElementById("taskList");
        if (taskInput.value !== "") {
            let li = document.createElement("li");
            li.textContent = taskInput.value;
            taskList.appendChild(li);
            taskInput.value = "";
        }
    }
</script>
</body>
</html>
