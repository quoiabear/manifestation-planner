<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial It Girl Planner</title>
    <style>
        body { background-color: #fff0f5; font-family: 'Verdana', sans-serif; color: #d63384; padding: 20px; }
        .header-decor { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: auto; }
        .box { background: white; padding: 20px; border-radius: 25px; border: 2px solid #ffc0cb; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #ff69b4; margin-top: 0; }
        input, textarea { width: 90%; padding: 10px; border: 1px solid #ffc0cb; border-radius: 10px; margin-bottom: 10px; }
        button { background: #ffb7c5; border: none; padding: 8px 15px; border-radius: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-decor">
        <h1 style="margin: auto;">Manifestation Planner</h1>
    </div>

    <div class="container">
        <div class="box">
            <h2>Daily Schedule</h2>
            <textarea placeholder="6 AM..."></textarea>
        </div>
        <div class="box">
            <h2>To-Do List</h2>
            <input type="text" id="taskInput" placeholder="Add a task...">
            <button onclick="addTask()">Add</button>
            <ul id="taskList"></ul>
        </div>
        <div class="box">
            <h2>Journaling & Scripting</h2>
            <textarea placeholder="What are you manifesting today?"></textarea>
        </div>
        <div class="box">
            <h2>Notes</h2>
            <textarea placeholder="Write a note..."></textarea>
        </div>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            if (input.value) {
                let li = document.createElement("li");
                li.textContent = input.value;
                document.getElementById("taskList").appendChild(li);
                input.value = "";
            }
        }
    </script>
</body>
</html>
