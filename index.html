<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial It Girl Planner</title>
    <style>
        body { background-color: #fff0f5; font-family: 'Arial', sans-serif; color: #d63384; margin: 0; padding: 20px; }
        nav { background: #ffb7c5; padding: 15px; border-radius: 20px; display: flex; gap: 15px; justify-content: center; cursor: pointer; }
        .page { display: none; margin-top: 20px; background: white; padding: 20px; border-radius: 20px; border: 2px solid #ffc0cb; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1, h2 { color: #ff69b4; }
        textarea { width: 100%; height: 100px; border: 1px solid #ffc0cb; border-radius: 10px; padding: 10px; }
    </style>
</head>
<body>

    <nav>
        <div onclick="showPage('dashboard')">Dashboard</div>
        <div onclick="showPage('journaling')">Journaling</div>
        <div onclick="showPage('daily')">Daily Planner</div>
    </nav>

    <!-- Dashboard Section -->
    <div id="dashboard" class="page" style="display: block;">
        <h2>Dashboard</h2>
        <input type="text" id="taskInput" placeholder="Add a task...">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <!-- Journaling Section -->
    <div id="journaling" class="page">
        <h2>Manifestation Journal</h2>
        <textarea placeholder="What are you manifesting today?"></textarea>
    </div>

    <!-- Daily Planner Section -->
    <div id="daily" class="page">
        <h2>Daily Planner</h2>
        <input type="date">
        <p>Schedule: (Add your hourly tasks here)</p>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }
        function addTask() {
            let input = document.getElementById("taskInput");
            if (input.value) {
                let li = document.createElement("li");
                li.textContent = input.value;
                document.getElementById("taskList").appendChild(li);
                input.value = "";
            }
        }
    </script>

</body>
</html>

    <script>
    function addTask() {
        let taskInput = document.getElementById("taskInput");
        let taskList = document.getElementById("taskList");
        if (taskInput.value !== "") {
            let li = document.createElement("li");
            li.textContent = taskInput.value;
            taskList.appendChild(li);
