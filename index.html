<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura and Essence Celestial It Girl Planner</title>
    <style>
    body {
        background-color: #fff0f5; /* Light blush pink background */
        font-family: 'Arial', sans-serif;
        color: #d63384; /* Celestial pink text */
    }

    nav ul {
        display: flex;
        list-style: none;
        gap: 20px;
        background: #ffb7c5; /* Soft pastel pink nav bar */
        padding: 15px;
        border-radius: 15px;
    }

    #dashboard-tools {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
    }

    #todo-list, #sticky-notes, #sticker-gallery {
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border: 2px solid #ffc0cb;
    }

    h1, h2 {
        color: #ff69b4; /* Hot pink headings */
    }
</style>
</head>
<body>
    <nav>
        <ul>
            <li>Dashboard</li>
            <li>Journaling</li>
            <li>Study Tools</li>
            <li>Budget</li>
        </ul>
    </nav>

    <main>
        <section id="welcome-message">
            <h1>Welcome, beautiful!</h1>
            <p>Welcome to your new interactive planner. Welcome to your interactive Aura and Essence Celestial It Girl Planner.</p>
        </section>

        <!-- New Dashboard Sections -->
        <section id="dashboard-tools">
            <div id="todo-list">
                <h2>To-Do List</h2>
                <!-- We will add task inputs here -->
            </div>

            <div id="sticky-notes">
                <h2>Notes</h2>
                <!-- Sticky note area -->
            </div>

            <div id="sticker-gallery">
                <h2>Sticker Collection</h2>
                <!-- Sticker grid area -->
            </div>
        </section>
    </main>
</body>
</html>
